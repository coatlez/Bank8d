<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>银行股8维评分器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#f5f6f8;--s1:#ffffff;--s2:#f0f1f4;--border:#e0e2e8;--border2:#c8cad4;
  --text:#1a1a2e;--t2:#3a3a5c;--t3:#7a7a9a;
  --gold:#c8860a;--green:#16a34a;--red:#dc2626;--blue:#2563eb;
  --font:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-logo{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:5px;}
.sp-sub{color:var(--t3);font-size:11px;letter-spacing:2px;}
.sp-bar{width:220px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden;}
.sp-fill{height:100%;background:var(--gold);width:0;transition:width .3s;}
#sp-msg{color:var(--t3);font-size:11px;}

/* HEADER */
.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:8px;}
.logo{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.logo em{color:var(--t3);font-style:normal;font-weight:400;font-size:11px;}
.hd-r{display:flex;align-items:center;gap:10px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--t3);}
.live-dot.on{background:var(--green);box-shadow:0 0 8px var(--green);}
.live-dot.fail{background:var(--red);}
#uptime{color:var(--t3);font-size:10px;}
.rbtn{background:transparent;border:1px solid var(--border2);color:var(--t2);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:11px;transition:all .2s;}
.rbtn:hover{border-color:var(--gold);color:var(--gold);}
.rbtn:disabled{opacity:.4;cursor:default;}

/* TABS */
.tabs{display:flex;background:var(--s2);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}

/* STATS */
.stats{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.stats::-webkit-scrollbar{display:none;}
.st{flex:1;min-width:64px;padding:8px 6px;border-right:1px solid var(--border);text-align:center;}
.st-l{color:var(--t3);font-size:9px;margin-bottom:3px;}
.st-v{font-size:13px;font-weight:700;}

/* TOOLBAR */
.toolbar{display:flex;gap:7px;padding:9px 13px;background:var(--s2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.srch{flex:1;min-width:120px;background:var(--s1);border:1px solid var(--border2);border-radius:4px;padding:7px 11px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.srch::placeholder{color:var(--t3);}
.srch:focus{border-color:var(--gold);}
.fb{background:transparent;border:1px solid var(--border2);color:var(--t2);padding:6px 10px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:10px;transition:all .2s;white-space:nowrap;}
.fb:hover,.fb.on{border-color:var(--gold);color:var(--gold);background:rgba(240,180,41,.07);}

/* NOTICE */
.notice{margin:8px 13px;padding:10px 13px;border-radius:5px;font-size:11px;line-height:1.8;display:none;white-space:pre-line;}
.notice.warn{background:rgba(200,134,10,.08);border:1px solid rgba(200,134,10,.3);color:#92600a;}
.notice.err{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.3);color:#b91c1c;}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:620px;}
thead{position:sticky;top:0;z-index:10;}
th{background:var(--s1);color:var(--t3);padding:8px 9px;text-align:right;font-size:10px;font-weight:600;border-bottom:2px solid var(--border2);cursor:pointer;white-space:nowrap;user-select:none;transition:color .15s;}
th:first-child{text-align:left;padding-left:13px;}
th.sk,th:hover{color:var(--gold);}
td{padding:8px 9px;text-align:right;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;color:var(--t2);}
td:first-child{text-align:left;padding-left:13px;}
tr{cursor:pointer;}
tr:hover td{background:rgba(200,134,10,.06);}
tr.sel td{background:rgba(200,134,10,.1);}
.bn{font-weight:700;color:var(--text);font-size:13px;}
.bc{color:var(--t3);font-size:9px;display:block;margin-top:1px;}
.tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;font-weight:700;margin-left:4px;vertical-align:middle;}
.tg-s{background:rgba(200,134,10,.15);color:#92600a;}
.tg-c{background:rgba(37,99,235,.12);color:#1d4ed8;}
.ind{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.ind-on{background:var(--green);}
.ind-off{background:var(--t3);}

/* SCORE BADGE */
.sbadge{display:inline-block;min-width:28px;padding:2px 6px;border-radius:4px;font-weight:700;font-size:12px;text-align:center;}

/* DRAWER */
#dw{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--s1);border-top:2px solid var(--gold);border-radius:14px 14px 0 0;transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
#dw.open{transform:translateY(0);}
.grip{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 2px;}
.dw-x{position:absolute;top:10px;right:14px;background:transparent;border:none;color:var(--t3);font-size:24px;cursor:pointer;line-height:1;padding:0 6px;}
.dw-body{padding:6px 15px 48px;}

/* DETAIL */
.dh{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--border);}
.dh-l{}
.dh-name{font-size:20px;font-weight:700;}
.dh-code{color:var(--t3);font-size:10px;margin-top:3px;}
.dh-r{text-align:right;}
.dh-price{font-size:24px;font-weight:700;color:var(--gold);}
.dh-chg{font-size:12px;margin-top:3px;}

/* 8维雷达替代：条形 */
.score-section{margin-bottom:16px;}
.score-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.score-title{font-size:12px;font-weight:700;color:var(--t2);}
.score-total{font-size:22px;font-weight:700;color:var(--gold);}
.score-rank{font-size:11px;color:var(--t3);margin-top:1px;text-align:right;}
.dim-list{display:flex;flex-direction:column;gap:7px;}
.dim-row{display:flex;align-items:center;gap:8px;}
.dim-name{color:var(--t3);font-size:10px;width:68px;flex-shrink:0;}
.dim-bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
.dim-bar{height:100%;border-radius:3px;transition:width .4s;}
.dim-val{font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}
.dim-rank{color:var(--t3);font-size:10px;width:30px;text-align:right;flex-shrink:0;}

.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.mc{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
.mc.g{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04);}
.mc.r{border-color:rgba(239,68,68,.25);}
.mc-l{color:var(--t3);font-size:10px;font-weight:600;margin-bottom:4px;}
.mc-v{font-size:16px;font-weight:700;}
.mc-s{color:var(--t3);font-size:10px;margin-top:3px;}

/* AI */
.ai-box{background:var(--s2);border:1px solid var(--border2);border-radius:7px;padding:13px;}
.ai-hd{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.ai-title{color:var(--t2);font-size:12px;font-weight:600;}
.qps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.qp{background:var(--s1);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:10px;color:var(--t2);cursor:pointer;transition:all .2s;}
.qp:hover{border-color:var(--gold);color:var(--gold);}
.ai-resp{font-size:12px;line-height:1.9;color:var(--t2);white-space:pre-wrap;min-height:48px;}
.ai-resp.dim{color:var(--t3);}
.ai-row{display:flex;gap:7px;margin-top:10px;}
.ai-inp{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:4px;padding:7px 11px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.ai-inp::placeholder{color:var(--t3);}
.ai-inp:focus{border-color:var(--gold);}
.ai-btn{background:var(--gold);border:none;color:#1a1000;padding:7px 15px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;}
.ai-btn:disabled{opacity:.35;cursor:default;}

/* SCORE TABLE TAB */
.score-tab-wrap{padding:12px;}
.score-tab-title{font-size:12px;color:var(--t3);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.score-table{}
.score-table table{min-width:340px;}
.score-table th{font-size:10px;}
.score-table td{font-size:11px;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>

<div id="splash">

  </div>
</div>

<div class="tabs">

</div>

  <div class="st"><div class="st-l">均股息</div><div class="st-v" style="color:var(--gold)" id="p-dy">—</div></div>
  <div class="st"><div class="st-l">均PE</div><div class="st-v" id="p-pe">—</div></div>
</div>

<div class="toolbar">

  <button class="fb" onclick="tf('pb')">低PB</button>
  <button class="fb" onclick="tf('div')">高股息</button>
  <button class="fb" onclick="tf('roe')">优ROE</button>
  <button class="fb" onclick="tf('top')">8维精选</button>
</div>

<div class="notice" id="notice"></div>

<!-- 综合排名视图 -->
<div id="view-rank">
<div class="tw">
<table>

    <th onclick="sb('roe')">ROE</th>
    <th onclick="sb('npl')">不良%</th>
    <th onclick="sb('pe')">PE</th>

</table>
</div>
</div>

<!-- 8维明细视图 -->
<div id="view-score" style="display:none">
<div class="score-tab-wrap">

    </tr></thead>
    <tbody id="tb-score"></tbody>
  </table>
  </div>
  </div>
</div>
</div>

<!-- 详情抽屉 -->
<div id="dw">

// 维度：PB(低好)、股息率(高好)、杠杆率(低好)、核心资本充足率(高好)
//       净利润增速(高好)、不良率(低好)、拨备覆盖率(高好)、ROE(高好)
// 方法：每个维度按42家排名，排名之和 = 8维总分（越低越好）
// ══════════════════════════════════════════════════
function calcScores(banks){
  const n = banks.length;
  function rankAsc(field){  // 值越小排名越靠前（rank=1最好）
    const sorted=[...banks].sort((a,b)=>a[field]-b[field]);
    sorted.forEach((b,i)=>b['r_'+field]=i+1);
  }
  function rankDesc(field){ // 值越大排名越靠前
    const sorted=[...banks].sort((a,b)=>b[field]-a[field]);
    sorted.forEach((b,i)=>b['r_'+field]=i+1);
  }
  rankAsc('pb');    // PB越低越好
  rankDesc('dy');   // 股息率越高越好
  rankAsc('lev');   // 杠杆率越低越好
  rankDesc('cap');  // 核心资本充足率越高越好
  rankDesc('npg');  // 净利润增速越高越好
  rankAsc('npl');   // 不良率越低越好
  rankDesc('prov'); // 拨备覆盖率越高越好
  rankDesc('roe');  // ROE越高越好

  banks.forEach(b=>{
    b.score8 = b.r_pb + b.r_dy + b.r_lev + b.r_cap + b.r_npg + b.r_npl + b.r_prov + b.r_roe;
  });

  // 8维综合排名
  const sorted=[...banks].sort((a,b)=>a.score8-b.score8);
  sorted.forEach((b,i)=>b.rank8=i+1);
}

let BANKS=BASE.map(r=>({
  name:r[0],code:r[1],pb:r[2],dy:r[3],roe:r[4],npl:r[5],
  prov:r[6],pe:r[7],lev:r[8],cap:r[9],npg:r[10],
  price:null,chg:null,chgA:null,live:false,
  score8:0,rank8:0,
  r_pb:0,r_dy:0,r_lev:0,r_cap:0,r_npg:0,r_npl:0,r_prov:0,r_roe:0
}));

calcScores(BANKS);

let sel=null,sk='score8',sd=1,sk2='score8',sd2=1,filters=new Set(),curTab='rank';

// ══════════════════════════════════════════════════
// 东方财富 JSONP 行情
// ══════════════════════════════════════════════════
// 从 GitHub 仓库读取 data.json（由 Actions 每日更新）
// ══════════════════════════════════════════════════
async function loadData(){
  const btn=document.getElementById('rfBtn');
  btn.disabled=true; btn.textContent='加载中…';
  sp(30,'读取行情数据…');

  // 先显示静态数据
  updateStats(); render();

  try{
    // 读取同目录下的 data.json
    const r = await fetch('./data.json?t=' + Date.now());
    if(!r.ok) throw new Error('data.json 未找到');
    const d = await r.json();

    if(!d.quotes) throw new Error('数据格式错误');

    // 写入行情
    let liveN = 0;
    BANKS.forEach(b=>{
      const q = d.quotes[b.code];
      if(q && q.price > 0){
        b.price = q.price;
        b.chg = q.chg;
        b.chgA = q.chgA;
        b.live = true;
        liveN++;
      }
    });

    updateStats(); render();
    const upd = d.updated || '未知';
    document.getElementById('uptime').textContent = upd;
    document.getElementById('live-dot').className = liveN>0 ? 'live-dot on' : 'live-dot fail';

    if(liveN > 0){
      hideNotice();
    } else {
      showNotice('warn', '⚠ 数据文件存在但无行情，可能是非交易日。');
    }
  } catch(e){
    document.getElementById('live-dot').className = 'live-dot fail';
    showNotice('warn', '⚠ 暂无实时行情（data.json 尚未生成）。\n首次需等 GitHub Actions 在交易日 16:30 自动运行后才有数据。\n也可在仓库 Actions 页面手动触发。');
  }
  btn.disabled=false; btn.textContent='↻ 刷新';
}

// ══════════════════════════════════════════════════
// 渲染
// ══════════════════════════════════════════════════
function filtered(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  return BANKS.filter(b=>{
    if(q&&!b.name.includes(q)&&!b.code.includes(q)) return false;
    if(filters.has('pb')&&b.pb>=0.65) return false;
    if(filters.has('div')&&b.dy<4.5) return false;
    if(filters.has('roe')&&b.roe<12) return false;
    if(filters.has('top')&&b.rank8>15) return false;
    return true;
  });
}

function render(){
  if(curTab==='rank') renderRank();
  else renderScore();
}

function renderRank(){
  let rows=filtered();
  rows.sort((a,b)=>{
    const av=a[sk]??(sd>0?Infinity:-Infinity);
    const bv=b[sk]??(sd>0?Infinity:-Infinity);
    return typeof av==='string'?av.localeCompare(bv)*sd:(av-bv)*sd;
  });
  document.getElementById('tb-rank').innerHTML=rows.map(b=>{
    const isSel=sel&&sel.name===b.name;
    const ps=b.price!=null?b.price.toFixed(2):'—';
    const cs=b.chg!=null?(b.chg>0?'+':'')+b.chg.toFixed(2)+'%':'—';
    const cc=b.chg==null?'var(--t3)':b.chg>0?'var(--green)':'var(--red)';
    const pbc=b.pb<0.55?'var(--green)':b.pb>0.9?'var(--red)':'var(--t2)';
    const dyc=b.dy>4.8?'var(--green)':b.dy<2.5?'var(--t3)':'var(--t2)';
    const rc=b.roe>13?'var(--green)':b.roe<7?'var(--red)':'var(--t2)';
    const nc=b.npl<1.0?'var(--green)':b.npl>1.5?'var(--red)':'var(--t2)';
    const sc=scoreColor(b.rank8);
    const typ=isSt(b.name);
    return`<tr class="${isSel?'sel':''}" onclick="openDw('${b.name}')">
      <td><span class="ind ${b.live?'ind-on':'ind-off'}"></span><span class="bn">${b.name}</span><span class="tag ${typ?'tg-s':'tg-c'}">${typ?'全国':'城农'}</span><span class="bc">${b.code}</span></td>
      <td><span class="sbadge" style="background:${sc.bg};color:${sc.fg}">#${b.rank8}</span></td>
      <td style="color:var(--gold);font-weight:700">${ps}</td>
      <td style="color:${cc};font-weight:700">${cs}</td>
      <td style="color:${pbc};font-weight:700">${b.pb}</td>
      <td style="color:${dyc}">${b.dy}%</td>
      <td style="color:${rc};font-weight:700">${b.roe}</td>
      <td style="color:${nc}">${b.npl}%</td>
      <td>${b.pe}</td>
    </tr>`;
  }).join('');
}

function renderScore(){
  let rows=filtered();
  rows.sort((a,b)=>{
    const av=a[sk2]??(sd2>0?Infinity:-Infinity);
    const bv=b[sk2]??(sd2>0?Infinity:-Infinity);
    return(av-bv)*sd2;
  });
  document.getElementById('tb-score').innerHTML=rows.map(b=>{
    const sc=scoreColor(b.rank8);
    const typ=isSt(b.name);
    const rC=r=>r<=10?'var(--green)':r>=35?'var(--red)':'var(--t2)';
    return`<tr onclick="openDw('${b.name}')">
      <td><span class="bn" style="font-size:12px">${b.name}</span><span class="tag ${typ?'tg-s':'tg-c'}" style="font-size:7px">${typ?'全':'城'}</span></td>
      <td><span class="sbadge" style="background:${sc.bg};color:${sc.fg};font-size:11px">${b.score8}</span></td>
      <td style="color:${rC(b.r_pb)};font-weight:600">${b.r_pb}</td>
      <td style="color:${rC(b.r_dy)};font-weight:600">${b.r_dy}</td>
      <td style="color:${rC(b.r_lev)};font-weight:600">${b.r_lev}</td>
      <td style="color:${rC(b.r_cap)};font-weight:600">${b.r_cap}</td>
      <td style="color:${rC(b.r_npg)};font-weight:600">${b.r_npg}</td>
      <td style="color:${rC(b.r_npl)};font-weight:600">${b.r_npl}</td>
      <td style="color:${rC(b.r_prov)};font-weight:600">${b.r_prov}</td>
      <td style="color:${rC(b.r_roe)};font-weight:600">${b.r_roe}</td>
    </tr>`;
  }).join('');
}

function scoreColor(rank){
  if(rank<=10) return{bg:'rgba(22,163,74,.15)',fg:'#15803d'};
  if(rank<=20) return{bg:'rgba(200,134,10,.15)',fg:'#92600a'};
  if(rank<=30) return{bg:'rgba(100,116,139,.12)',fg:'#475569'};
  return{bg:'rgba(220,38,38,.12)',fg:'#b91c1c'};
}

function updateStats(){
  const live=BANKS.filter(b=>b.live);
  document.getElementById('p-u').textContent=live.length?live.filter(b=>b.chg>0).length:'—';
  document.getElementById('p-d').textContent=live.length?live.filter(b=>b.chg<0).length:'—';
  document.getElementById('p-pb').textContent=(BANKS.reduce((s,b)=>s+b.pb,0)/BANKS.length).toFixed(2)+'x';
  document.getElementById('p-dy').textContent=(BANKS.reduce((s,b)=>s+b.dy,0)/BANKS.length).toFixed(2)+'%';
  document.getElementById('p-pe').textContent=(BANKS.reduce((s,b)=>s+b.pe,0)/BANKS.length).toFixed(1)+'x';
}

  document.getElementById('dwb').innerHTML=`
<div class="dh">

</div>

<div class="score-section">

</div>

<div class="mg">

}

// ══════════════════════════════════════════════════
// AI 分析
// ══════════════════════════════════════════════════
const SUM=BANKS.map(b=>`${b.name}:8维${b.score8}分#${b.rank8} PB${b.pb} 股息${b.dy}% ROE${b.roe}% 不良${b.npl}%`).join('; ');
async function ask(q){
  const ao=document.getElementById('ao'),ago=document.getElementById('ago');
  if(!ao||!sel) return;
  ao.className='ai-resp dim'; ao.textContent='▌ 分析中…'; ago.disabled=true;
  const b=sel;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:800,
        system:`你是A股银行股研究员，专注高股息价值投资。8维评分体系（分越低越好）：PB排名+股息率排名+杠杆率排名+核心资本充足率排名+净利润增速排名+不良率排名+拨备率排名+ROE排名之和。42家银行参考：${SUM}。回答200字内，给出明确结论。`,
        messages:[{role:'user',content:`分析${b.name}(${b.code}): 8维总分${b.score8}(#${b.rank8}/42) PB${b.pb}(#${b.r_pb}) 股息${b.dy}%(#${b.r_dy}) ROE${b.roe}%(#${b.r_roe}) 不良${b.npl}%(#${b.r_npl}) 拨备${b.prov}%(#${b.r_prov}) 利润增速${b.npg}%(#${b.r_npg})。${q}`}]
      })
    });
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    ao.className='ai-resp';
    ao.textContent=(d.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('')||'分析失败';
  }catch(e){
    ao.className='ai-resp'; ao.textContent='⚠ '+e.message;
  }
  ago.disabled=false;
}
function sendAsk(){const i=document.getElementById('ain');if(i?.value.trim()){ask(i.value.trim());i.value='';}}

// ══════════════════════════════════════════════════
// 工具函数
// ══════════════════════════════════════════════════
function isSt(n){return["招商","工商","建设","农业","中国","交通","邮储","中信","兴业","浦发","光大","民生","华夏","平安","浙商","北京","上海"].some(s=>n.includes(s));}
function tf(k){const b=document.querySelector(`[onclick="tf('${k}')"]`);filters.has(k)?(filters.delete(k),b?.classList.remove('on')):(filters.add(k),b?.classList.add('on'));render();}
function sb(k){sd=sk===k?-sd:(k==='score8'||k==='pb'||k==='npl'||k==='pe'?1:-1);sk=k;renderRank();}
function sb2(k){sd2=sk2===k?-sd2:1;sk2=k;renderScore();}
function switchTab(t){
  curTab=t;
  document.getElementById('tab-rank').className='tab'+(t==='rank'?' on':'');
  document.getElementById('tab-score').className='tab'+(t==='score'?' on':'');
  document.getElementById('view-rank').style.display=t==='rank'?'':'none';
  document.getElementById('view-score').style.display=t==='score'?'':'none';
  render();
}
function sp(p,m){document.getElementById('sp-fill').style.width=p+'%';document.getElementById('sp-msg').textContent=m;}
function showNotice(type,m){const n=document.getElementById('notice');n.className='notice '+type;n.textContent=m;n.style.display='block';}
function hideNotice(){document.getElementById('notice').style.display='none';}
function fmtTime(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});}

document.addEventListener('click',e=>{
  const dw=document.getElementById('dw');
  if(dw.classList.contains('open')&&!dw.contains(e.target)&&!e.target.closest('tr')) closeDw();
});

// 立即隐藏 splash，不等网络请求
document.getElementById('splash').style.display = 'none';
updateStats(); render();
// 异步加载行情
loadData();
</script>
