<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>银行股11维评分器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#f5f6f8;--s1:#fff;--s2:#f0f1f4;--border:#e0e2e8;--border2:#c8cad4;
  --text:#1a1a2e;--t2:#3a3a5c;--t3:#7a7a9a;
  --gold:#c8860a;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--orange:#ea580c;
  --font:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;}

#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.sp-logo{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:4px;}
.sp-sub{color:var(--t3);font-size:11px;letter-spacing:2px;}
.sp-bar{width:200px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden;}
.sp-fill{height:100%;background:var(--gold);width:0;transition:width .3s;}
#sp-msg{color:var(--t3);font-size:11px;}

.hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;gap:6px;flex-wrap:wrap;}
.logo{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px;white-space:nowrap;}
.logo em{color:var(--t3);font-style:normal;font-weight:400;font-size:11px;}
.hd-r{display:flex;align-items:center;gap:7px;}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;}
.ldot.on{background:var(--green);box-shadow:0 0 7px var(--green);}
.ldot.fail{background:var(--red);}
#ts{color:var(--t3);font-size:10px;}
.rbtn{background:transparent;border:1px solid var(--border2);color:var(--t2);padding:5px 10px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:10px;transition:all .2s;white-space:nowrap;}
.rbtn:hover{border-color:var(--gold);color:var(--gold);}
.rbtn:disabled{opacity:.4;cursor:default;}
.rbtn.orange{border-color:var(--orange);color:var(--orange);}
.rbtn.orange:hover{background:rgba(234,88,12,.08);}

/* 退出信号横幅 */
.exit-banner{background:rgba(220,38,38,.07);border-bottom:2px solid var(--red);padding:8px 14px;font-size:11px;color:var(--red);display:none;}
.exit-banner.show{display:block;}
.exit-title{font-weight:700;margin-bottom:4px;}

.stats{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.stats::-webkit-scrollbar{display:none;}
.si{flex:1;min-width:66px;padding:7px 6px;border-right:1px solid var(--border);text-align:center;}
.si-l{color:var(--t3);font-size:9px;margin-bottom:3px;}
.si-v{font-size:13px;font-weight:700;color:var(--text);}
.si-v.up{color:var(--green);}
.si-v.dn{color:var(--red);}
.si-v.gold{color:var(--gold);}

.tb{display:flex;gap:7px;padding:9px 13px;background:var(--s2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.srch{flex:1;min-width:110px;background:var(--s1);border:1px solid var(--border2);border-radius:4px;padding:7px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.srch::placeholder{color:var(--t3);}
.srch:focus{border-color:var(--gold);}
.fb{background:transparent;border:1px solid var(--border2);color:var(--t2);padding:5px 9px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:10px;transition:all .2s;white-space:nowrap;}
.fb:hover,.fb.on{border-color:var(--gold);color:var(--gold);background:rgba(200,134,10,.06);}
.fb.exit-f{border-color:var(--red);color:var(--red);}
.fb.exit-f.on{background:rgba(220,38,38,.07);}

.notice{margin:7px 13px;padding:9px 12px;border-radius:5px;font-size:11px;line-height:1.7;display:none;white-space:pre-line;}
.notice.warn{background:rgba(200,134,10,.08);border:1px solid rgba(200,134,10,.3);color:#92600a;}

/* 数据更新状态 */
.data-info{display:flex;align-items:center;justify-content:space-between;padding:6px 13px;background:var(--s2);border-bottom:1px solid var(--border);font-size:10px;color:var(--t3);}
.data-date{font-weight:600;}
.data-src{color:var(--t3);}

.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:660px;}
thead{position:sticky;top:0;z-index:10;}
th{background:var(--s1);color:var(--t3);padding:8px 8px;text-align:right;font-size:10px;font-weight:600;border-bottom:2px solid var(--border2);cursor:pointer;white-space:nowrap;user-select:none;}
th:first-child{text-align:left;padding-left:13px;}
th.sk,th:hover{color:var(--gold);}
td{padding:8px 8px;text-align:right;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;color:var(--t2);}
td:first-child{text-align:left;padding-left:13px;}
tr{cursor:pointer;}
tr:hover td{background:rgba(200,134,10,.04);}
tr.sel td{background:rgba(200,134,10,.08);}
/* 退出信号行 */
tr.exit-row td{background:rgba(220,38,38,.04);}
tr.exit-row td:first-child{border-left:3px solid var(--red);}

.bn{font-weight:700;color:var(--text);font-size:13px;}
.bc{color:var(--t3);font-size:9px;display:block;margin-top:1px;}
.tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;font-weight:700;margin-left:3px;vertical-align:middle;}
.tg-s{background:rgba(200,134,10,.15);color:#92600a;}
.tg-c{background:rgba(37,99,235,.12);color:#1d4ed8;}
.ind{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.ind-on{background:var(--green);}
.ind-off{background:var(--t3);}
.exit-tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;font-weight:700;background:rgba(220,38,38,.15);color:var(--red);margin-left:4px;vertical-align:middle;}

.sbadge{display:inline-block;min-width:28px;padding:2px 6px;border-radius:4px;font-weight:700;font-size:12px;text-align:center;}

/* DRAWER */
#dw{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--s1);border-top:2px solid var(--gold);border-radius:14px 14px 0 0;transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
#dw.open{transform:translateY(0);}
.grip{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 2px;}
.dw-x{position:absolute;top:10px;right:14px;background:transparent;border:none;color:var(--t3);font-size:24px;cursor:pointer;line-height:1;padding:0 6px;}
.dw-body{padding:6px 15px 48px;}

/* 退出信号卡片 */
.exit-card{background:rgba(220,38,38,.06);border:2px solid var(--red);border-radius:8px;padding:12px 14px;margin-bottom:14px;}
.exit-card-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px;}
.exit-item{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(220,38,38,.15);}
.exit-item:last-child{border-bottom:none;}
.exit-label{color:var(--t2);}
.exit-price{font-weight:700;color:var(--red);}
.hold-card{background:rgba(22,163,74,.06);border:2px solid var(--green);border-radius:8px;padding:12px 14px;margin-bottom:14px;}
.hold-card-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px;}
.hold-sub{font-size:11px;color:var(--t3);}

.dh{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border);}
.dh-name{font-size:19px;font-weight:700;}
.dh-code{color:var(--t3);font-size:10px;margin-top:3px;}
.dh-price{font-size:22px;font-weight:700;color:var(--gold);text-align:right;}
.dh-chg{font-size:12px;margin-top:3px;text-align:right;}

/* 11维条形图 */
.score-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.score-total{font-size:22px;font-weight:700;color:var(--gold);}
.score-rank{font-size:11px;color:var(--t3);text-align:right;}
.dim-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.dim-row{display:flex;align-items:center;gap:7px;}
.dim-name{color:var(--t3);font-size:10px;width:60px;flex-shrink:0;}
.dim-bar-wrap{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.dim-bar{height:100%;border-radius:3px;}
.dim-val{font-size:11px;font-weight:700;width:42px;text-align:right;flex-shrink:0;}
.dim-rank{color:var(--t3);font-size:10px;width:28px;text-align:right;flex-shrink:0;}

.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.mc{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
.mc.g{border-color:rgba(22,163,74,.3);background:rgba(22,163,74,.04);}
.mc.r{border-color:rgba(220,38,38,.25);}
.mc-l{color:var(--t3);font-size:10px;font-weight:600;margin-bottom:4px;}
.mc-v{font-size:15px;font-weight:700;color:var(--text);}
.mc-s{color:var(--t3);font-size:10px;margin-top:3px;}

/* AI */
.ai-box{background:var(--s2);border:1px solid var(--border2);border-radius:7px;padding:13px;}
.ai-hd{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.ai-title{color:var(--t2);font-size:12px;font-weight:600;}
.qps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.qp{background:var(--s1);border:1px solid var(--border2);border-radius:20px;padding:4px 11px;font-size:10px;color:var(--t2);cursor:pointer;transition:all .2s;}
.qp:hover{border-color:var(--gold);color:var(--gold);}
.ai-resp{font-size:12px;line-height:1.9;color:var(--t2);white-space:pre-wrap;min-height:48px;}
.ai-resp.dim{color:var(--t3);}
.ai-row{display:flex;gap:7px;margin-top:10px;}
.ai-inp{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:4px;padding:7px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.ai-inp::placeholder{color:var(--t3);}
.ai-inp:focus{border-color:var(--gold);}
.ai-btn{background:var(--gold);border:none;color:#1a1000;padding:7px 14px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;}
.ai-btn:disabled{opacity:.35;cursor:default;}

/* 刷新基本面 modal */
#refresh-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;}
#refresh-modal.show{display:flex;}
.rm-box{background:var(--s1);border-radius:14px 14px 0 0;padding:20px 16px 40px;width:100%;max-width:600px;}
.rm-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.rm-sub{font-size:11px;color:var(--t3);margin-bottom:14px;line-height:1.7;}
.rm-progress{background:var(--s2);border-radius:8px;padding:12px;margin-bottom:14px;font-size:11px;color:var(--t2);line-height:1.8;min-height:80px;}
.rm-btns{display:flex;gap:8px;}
.rm-btn{flex:1;padding:10px;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;border:none;}
.rm-start{background:var(--gold);color:#1a1000;}
.rm-cancel{background:var(--s2);color:var(--t2);}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">BANK·11D</div>
  <div class="sp-sub">银行股11维评分系统</div>
  <div class="sp-bar"><div class="sp-fill" id="sp-fill"></div></div>
  <div id="sp-msg">初始化...</div>
</div>

<div class="hd">
  <div class="logo">BANK·11D <em>/ 退出机制</em></div>
  <div class="hd-r">
    <div class="ldot" id="ldot"></div>
    <div id="ts">--</div>
    <button class="rbtn" id="rfBtn" onclick="loadPrice()">↻ 行情</button>
    <button class="rbtn orange" onclick="showRefreshModal()">↻ 基本面</button>
  </div>
</div>

<div class="exit-banner" id="exit-banner">
  <div class="exit-title">⚠ 退出信号提醒</div>
  <div id="exit-list"></div>
</div>

<div class="stats">
  <div class="si"><div class="si-l">银行数</div><div class="si-v gold" id="p-n">42</div></div>
  <div class="si"><div class="si-l">上涨</div><div class="si-v up" id="p-u">—</div></div>
  <div class="si"><div class="si-l">下跌</div><div class="si-v dn" id="p-d">—</div></div>
  <div class="si"><div class="si-l">均PB</div><div class="si-v" id="p-pb">—</div></div>
  <div class="si"><div class="si-l">均股息</div><div class="si-v gold" id="p-dy">—</div></div>
  <div class="si"><div class="si-l">国债</div><div class="si-v" id="p-bond">1.75%</div></div>
</div>

<div class="tb">
  <input class="srch" id="srch" placeholder="搜索银行…" oninput="render()">
  <button class="fb" onclick="tf('pb')">低PB</button>
  <button class="fb" onclick="tf('div')">高股息</button>
  <button class="fb" onclick="tf('top')">11维精选</button>
  <button class="fb exit-f" onclick="tf('exit')">⚠退出信号</button>
</div>

<div class="data-info">
  <span class="data-date" id="data-date">基础数据：2025年报</span>
  <span class="data-src" id="data-src">点「↻ 基本面」更新至最新季报</span>
</div>

<div class="notice" id="notice"></div>

<div class="tw">
<table>
  <thead><tr>
    <th onclick="sb('name')">银行</th>
    <th onclick="sb('score11')" class="sk">11维↑</th>
    <th onclick="sb('price')">现价</th>
    <th onclick="sb('chg')">涨跌%</th>
    <th onclick="sb('pb')">PB</th>
    <th onclick="sb('dy')">股息%</th>
    <th onclick="sb('roe')">ROE</th>
    <th onclick="sb('nim')">息差%</th>
    <th onclick="sb('npl')">不良%</th>
    <th onclick="sb('pettm')">PE</th>
  </tr></thead>
  <tbody id="tb-main"></tbody>
</table>
</div>

<!-- 详情抽屉 -->
<div id="dw">
  <div class="grip"></div>
  <button class="dw-x" onclick="closeDw()">×</button>
  <div class="dw-body" id="dwb"></div>
</div>

<!-- 刷新基本面 Modal -->
<div id="refresh-modal">
  <div class="rm-box">
    <div class="rm-title">↻ 更新基本面数据</div>
    <div class="rm-sub">通过 Claude AI 搜索最新季报数据（净息差、RORWA、关注类贷款等11维指标），约需3-5分钟，建议在WiFi下操作。</div>
    <div class="rm-progress" id="rm-prog">准备就绪，点击开始更新...</div>
    <div class="rm-btns">
      <button class="rm-btn rm-start" id="rm-start-btn" onclick="startFundamentalsRefresh()">开始更新</button>
      <button class="rm-btn rm-cancel" onclick="closeRefreshModal()">关闭</button>
    </div>
  </div>
</div>

// ══════════════════════════════════════════
// 11维评分计算
// ══════════════════════════════════════════
function calcScores(){
  const N = BANKS.length;
  function rankAsc(f){ const s=[...BANKS].sort((a,b)=>a[f]-b[f]); s.forEach((b,i)=>b['r_'+f]=i+1); }
  function rankDesc(f){ const s=[...BANKS].sort((a,b)=>b[f]-a[f]); s.forEach((b,i)=>b['r_'+f]=i+1); }

  rankAsc('pb');    // PB低好
  rankDesc('dy');   // 股息高好
  rankAsc('lev');   // 负债率低好
  rankDesc('rorwa');// RORWA高好
  rankAsc('attn');  // 关注类贷款占比低好
  rankDesc('npg');  // 净利润增速高好
  rankAsc('npl');   // 不良率低好
  rankDesc('prov'); // 拨备率高好
  rankDesc('roe');  // ROE高好
  rankDesc('nim');  // 净息差高好
  rankDesc('cap');  // 核心资本充足率高好

  BANKS.forEach(b=>{
    b.score11 = b.r_pb+b.r_dy+b.r_lev+b.r_rorwa+b.r_attn+b.r_npg+b.r_npl+b.r_prov+b.r_roe+b.r_nim+b.r_cap;
  });
  [...BANKS].sort((a,b)=>a.score11-b.score11).forEach((b,i)=>b.rank11=i+1);
}

// ══════════════════════════════════════════
// 退出机制计算（yyb凌波版本）
// 满足以下任一条件则生成退出信号+目标价
// ══════════════════════════════════════════
function calcExitSignals(){
  // 排名前10的PB均值（PB₁₀）
  const top10pb = [...BANKS].sort((a,b)=>a.pb-b.pb).slice(0,10);
  const pb10 = top10pb.reduce((s,b)=>s+b.pb,0)/10;
  
  // 排名第10的PB值
  const pb10th = top10pb[9].pb;
  
  // 2倍国债利率（用于股息率退出判断）
  const threshold_dy = BOND_RATE * 2; // 约3.50%

  BANKS.forEach(b=>{
    b.exitSignals = [];
    b.targetPrices = {};

    if(!b.price) return;

    // 条件1：PB > PB₁₀均值（超过前10均值）
    // 目标价 = 当前每股净资产 × PB₁₀均值
    const bvps = b.price / b.pb; // 每股净资产估算
    const tp1 = +(bvps * pb10).toFixed(2);
    if(b.pb > pb10){
      b.exitSignals.push('PB超前10均值');
      b.targetPrices['PB均值'] = tp1;
    }

    // 条件2：PB排名进入前10
    const tp2 = +(bvps * pb10th).toFixed(2);
    if(b.r_pb <= 10){
      b.exitSignals.push('PB进前10');
      b.targetPrices['PB前10'] = tp2;
    }

    // 条件3：股息率 < 2倍国债利率
    // 目标价 = 年分红 / (2×国债利率)
    const annualDiv = b.price * (b.dy/100); // 年分红估算
    const tp3 = +(annualDiv / (threshold_dy/100)).toFixed(2);
    if(b.dy < threshold_dy){
      b.exitSignals.push(`股息率<${threshold_dy.toFixed(2)}%`);
      b.targetPrices['股息率'] = tp3;
    }
  });

  // 更新退出信号横幅
  const exitBanks = BANKS.filter(b=>b.exitSignals.length>0 && b.price);
  const banner = document.getElementById('exit-banner');
  const exitList = document.getElementById('exit-list');
  if(exitBanks.length>0){
    exitList.innerHTML = exitBanks.map(b=>
      `<span style="margin-right:12px"><b>${b.name}</b> ${b.exitSignals.join('/')} ` +
      `目标价: ${Object.values(b.targetPrices).map(p=>'¥'+p).join('/')}</span>`
    ).join('');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

  calcExitSignals();

async function fetchFundamentals(batch){
  const list = batch.map(b=>`${b.name}(${b.code})`).join('、');

  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1200,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:`你是银行财务数据助手。搜索以下银行的最新财务数据（2025年报或2026Q1），返回严格JSON数组，不含任何说明文字。
字段说明：
- nim: 净息差(%)
- rorwa: RORWA净利润/风险加权资产(%)
- attn: 关注类贷款占比(%)
- npl: 不良贷款率(%)
- prov: 拨备覆盖率(%)
- roe: ROE(%)
- npg: 净利润增速(%)
- dy: 股息率(%)
- pb: 市净率
格式示例：[{"code":"600036","nim":1.87,"rorwa":1.54,"attn":1.47,"npl":0.94,"prov":391.79,"roe":13.44,"npg":1.21,"dy":4.20,"pb":1.05}]
找不到的字段填null，只返回JSON，不要其他文字。`,
      messages:[{role:'user',content:`请搜索并返回以下银行最新财务数据：${list}`}]
    })
  });

  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const d = await resp.json();

  // 处理多轮对话（web_search工具调用）
  let messages = [{role:'user',content:`请搜索并返回以下银行最新财务数据：${list}`}];
  messages.push({role:'assistant',content:d.content});

  let finalData = d;
  // 如果有tool_use，继续对话直到得到最终结果
  if(d.stop_reason === 'tool_use'){
    const toolUses = d.content.filter(c=>c.type==='tool_use');
    const toolResults = toolUses.map(tu=>({
      type:'tool_result', tool_use_id:tu.id, content:''
    }));
    messages.push({role:'user',content:toolResults});

    const resp2 = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`你是银行财务数据助手。返回严格JSON数组，不含任何说明文字。`,
        messages
      })
    });
    finalData = await resp2.json();
  }

  const text = (finalData.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').trim();
  return parseAndApply(text, batch);
}

function parseAndApply(text, batch){
  let arr = null;
  try{ arr=JSON.parse(text); }catch(_){}
  if(!arr){ const s=text.indexOf('['),e=text.lastIndexOf(']'); if(s!==-1&&e>s) try{arr=JSON.parse(text.slice(s,e+1));}catch(_){} }
  if(!Array.isArray(arr)||!arr.length) return false;

  let updated=0;
  arr.forEach(item=>{
    if(!item||!item.code) return;
    const code=String(item.code).padStart(6,'0');
    const b=BANKS.find(x=>x.code===code)||(item.name&&BANKS.find(x=>x.name===item.name));
    if(!b) return;
    if(item.nim!=null) b.nim=parseFloat(item.nim);
    if(item.rorwa!=null) b.rorwa=parseFloat(item.rorwa);
    if(item.attn!=null) b.attn=parseFloat(item.attn);
    if(item.npl!=null) b.npl=parseFloat(item.npl);
    if(item.prov!=null) b.prov=parseFloat(item.prov);
    if(item.roe!=null) b.roe=parseFloat(item.roe);
    if(item.npg!=null) b.npg=parseFloat(item.npg);
    if(item.dy!=null) b.dy=parseFloat(item.dy);
    if(item.pb!=null) b.pb=parseFloat(item.pb);
    updated++;
  });
  return updated>0;
}

async function fetchBondRate(){
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:200,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:'只返回一个数字，代表中国10年期国债当前收益率（%），例如：1.75',
      messages:[{role:'user',content:'中国10年期国债收益率现在是多少？只返回数字。'}]
    })
  });
  if(!resp.ok) return;
  const d = await resp.json();
  const text=(d.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').trim();
  const num=parseFloat(text.match(/[\d.]+/)?.[0]);
  if(num>0.5&&num<10){ BOND_RATE=num; document.getElementById('p-bond').textContent=num+'%'; }
}

<div class="dim-list">

</div>

<div class="mg">
  <div class="mc ${b.pb<0.6?'g':''}">

  <div class="mc ${b.dy>4.5?'g':''}">

  <div class="mc">

<div class="ai-box">
  <div class="ai-hd"><span class="ai-dot"></span><span class="ai-title">AI 研究员</span></div>

    <span class="qp" onclick="ask('综合评价${b.name}的11维评分和退出机制状态，给出配置建议')">配置建议</span>

// ══════════════════════════════════════════
// AI 分析
// ══════════════════════════════════════════
const SUM=BANKS.map(b=>`${b.name}:11维#${b.rank11} PB${b.pb} 股息${b.dy}% ROE${b.roe}% 息差${b.nim}% 不良${b.npl}%`).join('; ');

async function ask(q){
  const ao=document.getElementById('ao'),ago=document.getElementById('ago');
  if(!ao||!sel) return;
  ao.className='ai-resp dim'; ao.textContent='▌ 分析中…'; ago.disabled=true;
  const b=sel;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:800,
        system:`你是A股银行股研究员，专注高股息价值投资，熟悉yyb凌波的退出机制（PB>前10均值/PB进前10/股息率<2倍国债利率）。42家银行参考：${SUM}。回答200字内，给出明确结论。`,
        messages:[{role:'user',content:`分析${b.name}: 11维总分${b.score11}(#${b.rank11}/42) PB${b.pb}(#${b.r_pb}) 股息${b.dy}%(#${b.r_dy}) ROE${b.roe}% 息差${b.nim}% RORWA${b.rorwa}% 关注贷款${b.attn}% 不良${b.npl}% 拨备${b.prov}% 退出信号:${b.exitSignals.length>0?b.exitSignals.join('/'):'无'}。${q}`}]
      })
    });
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    ao.className='ai-resp';
    ao.textContent=(d.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('')||'分析失败';
  }catch(e){ ao.className='ai-resp'; ao.textContent='⚠ '+e.message; }
  ago.disabled=false;
}
function sendAsk(){ const i=document.getElementById('ain'); if(i?.value.trim()){ask(i.value.trim());i.value='';} }

// ══════════════════════════════════════════
// 工具函数
// ══════════════════════════════════════════
function calcPB10(){ return [...BANKS].sort((a,b)=>a.pb-b.pb).slice(0,10).reduce((s,b)=>s+b.pb,0)/10; }
function isSt(n){ return["招商","工商","建设","农业","中国","交通","邮储","中信","兴业","浦发","光大","民生","华夏","平安","浙商","北京","上海"].some(s=>n.includes(s)); }
function tf(k){ const b=document.querySelector(`[onclick="tf('${k}')"]`); filters.has(k)?(filters.delete(k),b?.classList.remove('on')):(filters.add(k),b?.classList.add('on')); render(); }
function sb(k){ sd=sk===k?-sd:(k==='score11'||k==='pb'||k==='npl'||k==='attn'?1:-1); sk=k; render(); }
function scoreColor(r){ if(r<=10)return{bg:'rgba(22,163,74,.15)',fg:'#15803d'}; if(r<=20)return{bg:'rgba(200,134,10,.15)',fg:'#92600a'}; if(r<=30)return{bg:'rgba(100,116,139,.12)',fg:'#475569'}; return{bg:'rgba(220,38,38,.12)',fg:'#b91c1c'}; }
function showNotice(m){ const n=document.getElementById('notice'); n.className='notice warn'; n.textContent=m; n.style.display='block'; }
function hideNotice(){ document.getElementById('notice').style.display='none'; }
function fmtTime(){ return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

document.addEventListener('click',e=>{
  const dw=document.getElementById('dw');
  if(dw.classList.contains('open')&&!dw.contains(e.target)&&!e.target.closest('tr')) closeDw();
  const modal=document.getElementById('refresh-modal');
  if(modal.classList.contains('show')&&!modal.querySelector('.rm-box').contains(e.target)) closeRefreshModal();
});

// ══════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════
document.getElementById('splash').style.display='none';
calcScores();
updateStats();
render();
loadPrice();
</script>
</body>
